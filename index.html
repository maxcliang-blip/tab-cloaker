<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="tabTitle">404 Not Found</title>
    <link id="tabIcon" rel="icon" type="image/png" href="https://ssl.gstatic.com/favicon.ico">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body onload="init()">

    <div id="shadow">
        <h1 id="error404">Error 404</h1>
        <p>The requested URL was not found on this server.</p>
    </div>

    <div id="decoyUI">
        <div id="liveTicker"><span>Loading Live Academic Feed... System Status: Optimal... Faculty Updates: None...</span></div>
        <div class="decoy-container">
            <h1 id="decoyMainTitle">Semester Study Planner</h1>
            <div class="decoy-card">
                <h3 id="decoyTimerTitle">Focus Session</h3>
                <h1 id="pomoDisplay">25:00</h1>
                <div class="flex-gap">
                    <button onclick="startTimer(25)" id="decoyWorkBtn">Start Work</button>
                    <button onclick="startTimer(5)" id="decoyBreakBtn">Break</button>
                </div>
            </div>
            <button onclick="location.reload()" class="exit-btn">Exit Session</button>
        </div>
    </div>

    <div id="mainUI">
        <div class="container">
            <div id="loginArea">
                <input type="password" id="pswd" placeholder="System Key...">
                <button onclick="verify()">Unlock</button>
            </div>

            <div id="dashboard" style="display:none;">
                <div class="tab-bar">
                    <button class="tab-btn active" onclick="openTab('core')">CORE</button>
                    <button class="tab-btn" onclick="openTab('stash')">STASH</button>
                    <button class="tab-btn" onclick="openTab('sys')">SYS</button>
                </div>

                <div id="core" class="tab-content active">
                    <div class="section-title">Launcher & History</div>
                    <div class="flex-gap">
                        <input type="text" id="target" placeholder="https://..." style="flex:3;">
                        <button onclick="launch()" class="success-btn" style="flex:1;">Launch</button>
                    </div>
                    <div id="historyList"></div>
                    
                    <div class="section-title">Vault <span id="saveStatus"></span></div>
                    <textarea id="vaultNotes" oninput="saveVault()" placeholder="Secure notes..."></textarea>
                </div>

                <div id="stash" class="tab-content">
                    <div class="section-title">File Stash (Base64)</div>
                    <div id="dropZone">Drag & Drop File Here</div>
                    <div id="fileList"></div>
                </div>

                <div id="sys" class="tab-content">
                    <div class="section-title">Tab Identity</div>
                    <input id="tabNameIn" placeholder="Tab Title" oninput="updateIdentity()">
                    <input id="tabIconIn" placeholder="Favicon URL" oninput="updateIdentity()">
                    
                    <div class="section-title">Global</div>
                    <label style="font-size: 0.7rem;"><input type="checkbox" id="restoreCheck" onchange="updateRestore()"> Restore Session on Login</label>
                    <button onclick="toggleTheme()">Toggle Dark Mode</button>
                    <button onclick="setPanicKey()" id="pkDisp">Set Panic Key</button>
                    <button onclick="panicExport()" class="danger-btn">EXPORT & WIPE</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
