<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found</title>
    <link id="appFavicon" rel="icon" type="image/png" href="https://ssl.gstatic.com">
    
    <script src="https://your-proxy.com/scramjet/scramjet.codecs.js"></script>
    <script src="https://your-proxy.com/scramjet/scramjet.config.js"></script>

    <style>
        :root {
            --bg-main: #fff; --text-main: #000; --panel-bg: #f0f0f0; --panel-border: #ccc;
            --accent: #1a73e8; --accent-2: #34a853; --input-bg: #fff; --input-border: #aaa;
            --input-text: #000; --fav-bg: #f8f8f8; --fav-border: #ccc; --danger: #b00020;
        }
        body[data-theme="dark"] {
            --bg-main: #111; --text-main: #fff; --panel-bg: #222; --panel-border: #444;
            --input-bg: #000; --input-border: #555; --input-text: #0f0; --fav-bg: #111;
        }
        body { margin: 0; font-family: sans-serif; background: var(--bg-main); color: var(--text-main); height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; overflow: hidden; }
        #shadow { text-align: center; }
        #error404 { font-size: 50px; cursor: default; user-select: none; }
        .trigger { cursor: pointer; }
        #mainUI { display: none; width: 100%; flex-direction: column; justify-content: center; align-items: center; }
        .container { background: var(--panel-bg); padding: 25px; border-radius: 10px; border: 1px solid var(--panel-border); width: 450px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); max-height: 90vh; overflow-y: auto; position: relative; }
        input, select { width: 90%; padding: 8px; margin: 6px auto; border-radius: 5px; border: 1px solid var(--input-border); background: var(--input-bg); color: var(--input-text); font-family: monospace; display: block; }
        button { padding: 8px 16px; cursor: pointer; background: var(--accent); color: white; border: none; border-radius: 5px; font-weight: bold; margin-top: 8px; transition: 0.2s; width: 100%; }
        button:hover { filter: brightness(1.2); }
        .launch-btn { background: var(--accent-2); font-size: 1.1rem; margin-top: 15px; }
        .section-title { margin-top: 15px; font-size: 0.75rem; color: #888; text-align: left; padding: 0 10px; text-transform: uppercase; letter-spacing: 1px; display: flex; justify-content: space-between; align-items: center;}
        #favList, #historyList { margin: 10px auto; width: 92%; background: var(--fav-bg); border: 1px solid var(--fav-border); max-height: 100px; overflow-y: auto; font-size: 0.8rem; padding: 5px; border-radius: 4px; }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 5px; border-bottom: 1px solid var(--panel-border); }
        #statusLight { width: 10px; height: 10px; background: #444; border-radius: 50%; display: inline-block; border: 1px solid #000; }
        .toast { position: fixed; bottom: 20px; right: 20px; background: rgba(0,0,0,0.9); color: #fff; padding: 10px 20px; border-radius: 5px; z-index: 1000; font-size: 0.9rem; pointer-events: none; }
        #wikiMode { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: #fff; color:#000; overflow-y:auto; padding: 50px; z-index: 99999; text-align: left; }
    </style>
</head>
<body onload="init()">

    <div id="wikiMode" onclick="toggleWiki()">
        <h1 style="border-bottom: 1px solid #a2a9b1;">Internet Protocol</h1>
        <p>The <b>Internet Protocol</b> (<b>IP</b>) is the principal communications protocol in the Internet protocol suite...</p>
    </div>

    <div id="shadow">
        <h1 id="error404">Error <span class="trigger" onclick="unlock()">4</span>04</h1>
        <p>The requested URL was not found on this server.</p>
    </div>

    <div id="mainUI">
        <div class="container">
            <h1>Elite Cloaker v31</h1>
            
            <div id="loginArea">
                <input type="password" id="pswd" placeholder="Master Key or Recovery Key...">
                <button onclick="verify()">Unlock System</button>
            </div>
            
            <div id="controls" style="display:none;">
                <div class="section-title">
                    Connection Engine <span id="statusLight"></span>
                </div>
                <select id="proxyEngine" onchange="toggleProxyInput()">
                    <option value="scramjet">Scramjet (Stealth)</option>
                    <option value="rammerhead">Rammerhead (Compatibility)</option>
                    <option value="none">None (Direct Load)</option>
                </select>
                <div id="proxyInputArea">
                    <input type="text" id="uvBase" placeholder="Base URL (e.g., https://...)">
                </div>
                <input type="text" id="target" placeholder="Target Site (https://...)">
                
                <div class="section-title">
                    History <span onclick="clearHistory()" style="cursor:pointer; color:var(--danger); font-size:10px;">[Wipe]</span>
                </div>
                <div id="historyList"></div>
                
                <input type="text" id="panic" value="https://classroom.google.com" placeholder="Panic URL">

                <div class="section-title">Favorites</div>
                <div id="favList"></div>
                <button onclick="saveLink()" style="font-size: 0.7rem; padding: 5px 10px;">+ Save Target</button>

                <button class="launch-btn" onclick="launch()">Launch Cloak</button>
                <button onclick="toggleWiki()" style="background:#666; font-size:0.8rem;">Instant Stealth Mode</button>
                
                <div class="section-title">Security</div>
                <input type="password" id="newKey" placeholder="New Master Key">
                <button onclick="updateKey()" style="font-size:0.7rem;">Update Master Key</button>

                <hr style="border:0; border-top:1px solid #444; margin: 20px 0;">
                <button onclick="selfDestruct()" style="background:var(--danger); font-size:0.7rem;">Self-Destruct (Full Wipe)</button>
            </div>
        </div>
    </div>

    <div id="toastContainer"></div>

    <script>
        const GLOBAL_RECOVERY_KEY = "SUPER-ADMIN-2026";
        let settings = JSON.parse(localStorage.getItem('cloakerSettings')) || {};

        function save() { localStorage.setItem('cloakerSettings', JSON.stringify(settings)); }

        function init() {
            if (!settings.masterHash) settings.masterHash = btoa("password");
            if (!settings.favs) settings.favs = [];
            if (!settings.history) settings.history = [];
            if (!settings.theme) settings.theme = "dark";
            if (!settings.tabTitle) settings.tabTitle = "Classes";
            if (!settings.tabFavicon) settings.tabFavicon = "https://ssl.gstatic.com";
            
            document.body.setAttribute('data-theme', settings.theme);
            document.getElementById('uvBase').value = settings.lastBase || "";
            renderFavs();
            renderHistory();
            checkProxyStatus();
            toggleProxyInput();
        }

        function toggleProxyInput() {
            const engine = document.getElementById('proxyEngine').value;
            const inputArea = document.getElementById('proxyInputArea');
            inputArea.style.display = (engine === "none") ? "none" : "block";
        }

        function unlock() {
            document.getElementById('shadow').style.display = 'none';
            document.getElementById('mainUI').style.display = 'flex';
        }

        function verify() {
            const input = document.getElementById('pswd').value;
            if (btoa(input) === settings.masterHash || input === GLOBAL_RECOVERY_KEY) {
                document.getElementById('controls').style.display = 'block';
                document.getElementById('loginArea').style.display = 'none';
                showToast("Unlocked");
            } else { showToast("Denied"); }
        }

        function updateKey() {
            const newKey = document.getElementById('newKey').value;
            if (newKey.length < 4) return showToast("Too short");
            settings.masterHash = btoa(newKey);
            save();
            showToast("Key Updated");
        }

        async function checkProxyStatus() {
            const light = document.getElementById('statusLight');
            const base = document.getElementById('uvBase').value;
            const engine = document.getElementById('proxyEngine').value;
            if (!base || engine === "none") { light.style.background = '#444'; return; }
            try {
                await fetch(base, { mode: 'no-cors', cache: 'no-store' });
                light.style.background = '#0f0';
            } catch (e) { light.style.background = '#f00'; }
        }

        function launch() {
            const target = document.getElementById('target').value;
            const proxyBase = document.getElementById('uvBase').value.replace(/\/$/, "");
            const engine = document.getElementById('proxyEngine').value;
            const panicUrl = document.getElementById('panic').value;

            if (!target.startsWith('http')) return showToast("Need https://");

            settings.history = [target, ...settings.history.filter(h => h !== target)].slice(0, 5);
            if (engine !== "none") settings.lastBase = proxyBase;
            save();
            renderHistory();

            let finalUrl = target;
            if (engine === "rammerhead") {
                finalUrl = `${proxyBase}/main/${target}`;
            } else if (engine === "scramjet") {
                if (window.__scramjet$config) {
                    finalUrl = `${proxyBase}${__scramjet$config.prefix}${__scramjet$config.codec.encode(target)}`;
                } else {
                    return showToast("Scramjet Script not loaded!");
                }
            }

            const blobHTML = `<html><head><title>${settings.tabTitle}</title><link rel="icon" href="${settings.tabFavicon}"><style>body,html{margin:0;padding:0;height:100%;overflow:hidden;background:#000;}iframe{width:100%;height:100%;border:none;}</style></head><body><iframe src="${finalUrl}"></iframe><script>window.addEventListener('keydown',(e)=>{if(e.key==="\\\\")window.location.replace("${panicUrl}");});<\/script></body></html>`;
            const win = window.open('about:blank', '_blank');
            if (win) win.location.href = URL.createObjectURL(new Blob([blobHTML], { type: 'text/html' }));
        }

        function renderFavs() {
            const list = document.getElementById('favList');
            if (!settings.favs || settings.favs.length === 0) { list.innerHTML = "No Favorites"; return; }
            list.innerHTML = settings.favs.map(f => `<div class="list-item"><span onclick="document.getElementById('target').value='${f}'" style="cursor:pointer; overflow:hidden;">${f}</span><button onclick="deleteFav('${f}')" style="background:var(--danger); width:auto; padding:2px 6px;">X</button></div>`).join('');
        }

        function renderHistory() {
            const list = document.getElementById('historyList');
            if (!settings.history || settings.history.length === 0) { list.innerHTML = "Empty"; return; }
            list.innerHTML = settings.history.map(h => `<div class="list-item" onclick="document.getElementById('target').value='${h}'" style="cursor:pointer; font-size:0.7rem;">${h}</div>`).join('');
        }

        function saveLink() {
            const url = document.getElementById('target').value;
            if (url && !settings.favs.includes(url)) { settings.favs.push(url); save(); renderFavs(); }
        }

        function deleteFav(url) { settings.favs = settings.favs.filter(f => f !== url); save(); renderFavs(); }
        function clearHistory() { settings.history = []; save(); renderHistory(); showToast("History Wiped"); }
        function toggleWiki() { const w = document.getElementById('wikiMode'); w.style.display = (w.style.display === 'block') ? 'none' : 'block'; }
        function selfDestruct() { if (confirm("Wipe everything?")) { localStorage.clear(); location.reload(); } }
        function showToast(msg) { const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg; document.getElementById('toastContainer').appendChild(t); setTimeout(() => t.remove(), 2500); }
    </script>
</body>
</html>
