<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="tabTitle">404 Not Found</title>
    <link id="tabIcon" rel="icon" type="image/png" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
</head>
<body onload="init()" data-skin="default">

    <div id="shadow">
        <h1 id="error404">404</h1>
        <p>The requested URL was not found on this server.</p>
    </div>

    <div id="decoyUI" style="display:none;">
        <div id="liveTicker"><span>SYSTEM STATUS: OPTIMAL // ENCRYPTION: AES-256 // SESSION: SECURE...</span></div>
        <div class="decoy-container">
            <h1>Academic Workspace</h1>
            <div class="decoy-card">
                <h1 id="pomoDisplay">25:00</h1>
                <button onclick="location.reload()">Resume Study</button>
            </div>
        </div>
    </div>

    <div id="mainUI" style="opacity:0;">
        <div class="container" id="mainContainer">
            <div id="loginArea">
                <input type="password" id="pswd" placeholder="System Key...">
                <button onclick="verify()">Unlock</button>
            </div>

            <div id="dashboard" style="display:none;">
                <div class="tab-bar">
                    <button class="tab-btn active" onclick="openTab('core')">CORE</button>
                    <button class="tab-btn" onclick="openTab('term')">TERM</button>
                    <button class="tab-btn" onclick="openTab('mirror')">MIRROR</button>
                    <button class="tab-btn" onclick="openTab('sys')">SYS</button>
                </div>

                <div id="core" class="tab-content active">
                    <div class="section-title">Ghost Launcher</div>
                    <div class="launcher-grid">
                        <input type="text" id="target" placeholder="https://...">
                        <select id="stealthMode">
                            <option value="direct">Direct</option>
                            <option value="null">Null-Ref</option>
                            <option value="proxy">Proxy</option>
                        </select>
                        <button onclick="launch()" class="success-btn">Go</button>
                    </div>
                    
                    <div class="section-title" style="display:flex; justify-content:space-between;">
                        <span>Recent Sessions</span>
                        <span onclick="clearHistory()" style="cursor:pointer; color:var(--danger); font-size:0.5rem;">[ WIPE ]</span>
                    </div>
                    <div id="historyList" class="history-container"></div>
                    
                    <div class="section-title">Encrypted Vault</div>
                    <textarea id="vaultNotes" oninput="saveVault()" placeholder="Auto-encrypting notes..."></textarea>
                </div>

                <div id="term" class="tab-content">
                    <div id="terminalOutput">GhostOS v63.2 Ready...</div>
                    <div class="terminal-input-line">
                        <span>$</span>
                        <input id="termInput" autocomplete="off" onkeydown="if(event.key==='Enter')handleCmd()">
                    </div>
                </div>

                <div id="mirror" class="tab-content">
                    <div class="section-title">Split-View Mirroring</div>
                    <input id="m1" placeholder="Left Side URL">
                    <input id="m2" placeholder="Right Side URL">
                    <button onclick="buildMirror()">Initialize Split</button>
                </div>

                <div id="sys" class="tab-content">
                    <div class="section-title">Visuals</div>
                    <select id="skinSelect" onchange="updateSkin()">
                        <option value="default">Default Pro</option>
                        <option value="outlook">Outlook</option>
                        <option value="discord">Discord</option>
                        <option value="canvas">Canvas</option>
                    </select>
                    <input id="tabNameIn" placeholder="Tab Title" oninput="updateIdentity()">
                    
                    <div class="section-title">Panic Settings</div>
                    <input id="panicUrlIn" placeholder="Panic Redirect URL" oninput="updatePanicUrl()">
                    
                    <button onclick="panicExport()" class="danger-btn" style="margin-top:20px;">WIPE ALL DATA</button>
                </div>
            </div>
        </div>

        <div id="mirrorView" style="display:none;">
            <div class="mirror-bar"><button onclick="closeMirror()">X Close Mirror</button></div>
            <div class="mirror-grid">
                <iframe id="frameLeft"></iframe>
                <iframe id="frameRight"></iframe>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
