<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="tabTitle">404 Not Found</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
</head>

<body onload="init()" data-skin="default" data-profile="default">

    <div id="shadow">
        <h1>Not Found</h1>
        <p>The requested URL was not found on this server.</p>
        <hr>
        <address>Apache/2.4.41 (Ubuntu) Server at localhost Port 80</address>
    </div>

    <div id="mainUI" style="opacity:0;">
        <div class="container" id="mainContainer">
            <div id="loginArea">
                <input type="password" id="pswd" placeholder="System Key...">
                <button onclick="verify()">Unlock</button>
            </div>

            <div id="dashboard" style="display:none;">
                <div class="tab-bar">
                    <button class="tab-btn active" onclick="openTab('core')">CORE</button>
                    <button class="tab-btn" onclick="openTab('term')">TERM</button>
                    <button class="tab-btn" onclick="openTab('sys')">SYS</button>
                </div>

                <div id="core" class="tab-content active">
                    <div class="section-title">Phantom Launcher</div>
                    <div class="launcher-grid">
                        <input type="text" id="target" placeholder="Target URL...">
                        <button onclick="launch()" class="success-btn">Go</button>
                    </div>

                    <div class="section-title" style="display:flex; justify-content:space-between;">
                        <span>Shadow Bookmarks</span>
                        <span onclick="addBookmark()" style="cursor:pointer; color:var(--accent);">[ + ]</span>
                    </div>
                    <div id="bookmarkList" class="history-container"></div>

                    <div class="section-title">Encrypted Vault</div>
                    <textarea id="vaultNotes" oninput="saveVault()" placeholder="Notes..."></textarea>
                    <button onclick="shadowPrint()" style="margin-top:5px; font-size:0.6rem; background:#666;">Print
                        Decoy PDF</button>
                </div>

                <div id="term" class="tab-content">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:5px;">
                        <canvas id="integrityGraph" width="300" height="40"></canvas>
                        <div id="netHeartbeat"></div>
                    </div>
                    <div id="terminalOutput">GhostOS v68.0 Phantom Online...</div>
                    <div class="terminal-input-line">
                        <span>$</span><input id="termInput" autocomplete="off"
                            onkeydown="if(event.key==='Enter')handleCmd()">
                    </div>
                </div>

                <div id="sys" class="tab-content">
                    <div class="section-title">Identity & Profiles</div>
                    <select id="profileSelect" onchange="switchProfile()">
                        <option value="default">Default Profile</option>
                        <option value="research">Research Profile</option>
                        <option value="dev">Dev Profile</option>
                    </select>
                    <button onclick="renameProfile()" style="font-size:0.6rem; margin-top:5px;">Set Tab Title</button>

                    <div class="section-title">Automated Security</div>
                    <label class="switch-label"><input type="checkbox" id="autoSwitchToggle"
                            onchange="toggleAutoSwitch()"> Panic on Tab Switch</label>
                    <label class="switch-label"><input type="checkbox" id="focusBlurToggle"
                            onchange="toggleFocusBlur()"> Blur on Unfocus</label>

                    <div class="section-title">Panic Configuration</div>
                    <input id="panicUrlIn" placeholder="Redirect URL" oninput="updatePanicUrl()">
                    <div style="display:flex; gap:5px;">
                        <input type="number" id="dmTimer" placeholder="Min" style="width:60px;">
                        <button onclick="startDeadMan()">Arm DM</button>
                    </div>
                    <button onclick="panicExport()" class="danger-btn" style="margin-top:15px;">Wipe
                        LocalStorage</button>
                </div>
            </div>
        </div>
    </div>

    <div id="blurOverlay" onclick="toggleBlur()" style="display:none;">SYSTEM PAUSED</div>

    <script src="script.js"></script>
</body>

</html>
