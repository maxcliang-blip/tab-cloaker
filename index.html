<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="tabTitle">404 Not Found</title>
    <link id="tabIcon" rel="icon" type="image/png" href="https://ssl.gstatic.com/favicon.ico">
    
    <style>
        :root {
            --bg-main: #fff; --text-main: #000; --panel-bg: #f4f4f4; --panel-border: #ddd;
            --accent: #1a73e8; --accent-2: #34a853; --input-bg: #fff; --input-border: #ccc;
            --input-text: #000; --danger: #d93025; --success: #2e7d32;
        }
        body[data-theme="dark"] {
            --bg-main: #111; --text-main: #eee; --panel-bg: #222; --panel-border: #444;
            --input-bg: #000; --input-border: #555; --input-text: #0f0;
        }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg-main); color: var(--text-main); height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; overflow: hidden; transition: 0.3s; }
        
        #shadow { text-align: center; user-select: none; transition: opacity 0.5s; }
        #error404 { font-size: 5rem; margin: 0; font-weight: 300; }

        #decoyUI { display:none; width: 100%; height: 100vh; background: #f9f9f9; color: #333; padding: 40px; box-sizing: border-box; position: absolute; top: 0; left: 0; z-index: 500; }
        .decoy-card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 10px;}

        #mainUI { display: none; width: 100%; flex-direction: column; justify-content: center; align-items: center; position: absolute; z-index: 100; opacity: 0; transition: opacity 0.5s; }
        .container { background: var(--panel-bg); padding: 25px; border-radius: 12px; border: 1px solid var(--panel-border); width: 420px; box-shadow: 0 15px 40px rgba(0,0,0,0.3); max-height: 90vh; overflow-y: auto; }
        
        input, select, textarea { width: 92%; padding: 10px; margin: 8px auto; border-radius: 6px; border: 1px solid var(--input-border); background: var(--input-bg); color: var(--input-text); font-family: monospace; display: block; outline: none; transition: border 0.2s; }
        input:focus { border-color: var(--accent); }
        button { padding: 10px; cursor: pointer; background: var(--accent); color: white; border: none; border-radius: 6px; width: 100%; font-weight: 600; margin-top: 8px; transition: transform 0.1s, opacity 0.2s; }
        button:active { transform: scale(0.98); }
        button:hover { opacity: 0.9; }
        
        .launch-btn { background: var(--accent-2); font-size: 1.1rem; padding: 15px; }
        .section-title { margin-top: 15px; font-size: 0.7rem; color: #888; text-transform: uppercase; letter-spacing: 1px; padding: 0 10px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--panel-border); padding-bottom: 5px; margin-bottom: 5px; }
        
        #logList { max-height: 60px; overflow-y: auto; font-size: 0.65rem; font-family: monospace; background: #000; color: #0f0; padding: 8px; border-radius: 4px; border: 1px solid #333; }
        #sandboxModal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; z-index: 2000; }
        .frameWrap { width: 98%; height: 94%; background: #000; position: relative; border-radius: 8px; overflow: hidden; }
        .closeBtn { position: absolute; top: 10px; right: 10px; background: var(--danger); color: #fff; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; z-index: 2100; font-weight: bold; }
        
        .toast { position: fixed; bottom: 20px; right: 20px; background: #333; color: #fff; padding: 12px 24px; border-radius: 8px; font-size: 0.85rem; z-index: 3000; border: 1px solid var(--accent); box-shadow: 0 5px 15px rgba(0,0,0,0.3); animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        .bm-btn { padding: 8px; font-size: 0.7rem; background: var(--accent); color: white; border-radius: 4px; border: none; cursor: pointer; position: relative; text-align: left; display: flex; align-items: center; justify-content: space-between; }
        .bm-del { background: rgba(0,0,0,0.2); width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; border-radius: 3px; }
        
        .disguise-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; }
        .disguise-btn { padding: 6px; font-size: 0.6rem; background: #444; color: white; border: none; border-radius: 4px; cursor: pointer; margin: 0; }
    </style>
    <style id="dynamicStyles"></style>
</head>
<body onload="init()">

    <div id="shadow">
        <h1 id="error404">Error 404</h1>
        <p>The requested URL was not found on this server.</p>
    </div>

    <div id="decoyUI">
        <div style="max-width: 800px; margin: auto;">
            <h1 style="color: #1a73e8; border-bottom: 2px solid #1a73e8;">Semester Study Planner</h1>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px;">
                <div class="decoy-card"><h3>Tasks</h3><ul><li>Research Draft</li><li>Math Set #4</li></ul></div>
                <div class="decoy-card"><h3>Deadlines</h3><p style="color:red">Bio Exam - Friday</p></div>
            </div>
            <button onclick="location.reload()" style="width:auto; padding: 10px 20px; background:#ddd; color:#333;">Sync Data</button>
        </div>
    </div>

    <div id="mainUI">
        <div class="container" id="uiContainer">
            <div id="loginArea">
                <h2 style="margin:0; font-size:1rem;">System Restricted</h2>
                <input type="password" id="pswd" placeholder="Enter Key...">
                <button onclick="verify()">Unlock</button>
            </div>

            <div id="dashboard" style="display:none;">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span style="font-size: 0.7rem; color: var(--accent);">v52 Ghost Protocol</span>
                    <button onclick="toggleTheme()" style="width:auto; margin:0; padding:4px 8px; font-size:0.6rem;">Toggle Dark</button>
                </div>

                <div class="section-title">Profiles</div>
                <div style="display:flex; align-items:center; gap:5px;">
                    <select id="profileSelect" style="width:auto; margin:0;" onchange="switchProfile(this.value)"></select>
                    <input id="newProfileName" placeholder="New..." style="width:80px; padding:6px; margin:0;">
                    <button onclick="addProfile()" style="background:#4caf50; padding:6px; width:auto; margin:0;">+</button>
                </div>

                <div class="section-title">Security & Visuals</div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:4px;">
                    <button onclick="toggleProtect()" style="background:#795548; font-size:0.65rem; margin:0;">Encryption</button>
                    <button id="pkDisp" onclick="setPanicKey()" style="background:#444; font-size:0.65rem; margin:0;">Panic Key</button>
                </div>
                <textarea id="customCSS" placeholder="/* CSS Skin */" style="height: 35px; font-size: 0.6rem;"></textarea>
                <button onclick="applyCSS()" style="background:#673ab7; font-size:0.65rem; margin-top:0;">Apply Skin</button>

                <div class="section-title">Advanced Stealth</div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:4px;">
                    <button onclick="toggleClickJack()" id="cjBtn" style="font-size:0.65rem; margin:0;">Clickjack: OFF</button>
                    <button onclick="toggleAutoLock()" id="alBtn" style="font-size:0.65rem; margin:0;">Auto-Lock: ON</button>
                </div>

                <div class="section-title">Tab Disguise</div>
                <div class="disguise-grid">
                    <button class="disguise-btn" onclick="setDisguise('google')">Google</button>
                    <button class="disguise-btn" onclick="setDisguise('drive')">Drive</button>
                    <button class="disguise-btn" onclick="setDisguise('classroom')">Class</button>
                    <button class="disguise-btn" onclick="setDisguise('calc')">Calc</button>
                    <button class="disguise-btn" onclick="setDisguise('404')">404</button>
                    <button class="disguise-btn" onclick="setDisguise('custom')">Edit</button>
                </div>
                <div id="customDisguise" style="display:none; margin-top:5px;">
                    <input id="customTitle" placeholder="Title" style="font-size:0.65rem; padding:4px;">
                    <input id="customIcon" placeholder="Icon URL" style="font-size:0.65rem; padding:4px;">
                </div>

                <div class="section-title">System Tools</div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:4px;">
                    <button onclick="mirrorTab()" style="background:#2196f3; font-size:0.65rem; margin:0;">Mirror Tab</button>
                    <button onclick="checkPing()" style="background:#9c27b0; font-size:0.65rem; margin:0;">Probe Net</button>
                </div>

                <div class="section-title">History</div>
                <div id="logList"></div>
                <button onclick="clearLog()" style="background:var(--danger); font-size:0.6rem;">Wipe Logs</button>

                <div class="section-title">Launcher</div>
                <input type="text" id="target" placeholder="https://...">
                <div style="display:flex; justify-content: space-around;">
                    <label style="font-size:0.65rem;"><input type="checkbox" id="sandboxChk"> Sandbox</label>
                    <label style="font-size:0.65rem;"><input type="checkbox" id="autoMuteChk" checked> Auto-Mute</label>
                </div>
                <button class="launch-btn" onclick="launch()">Execute Cloak</button>

                <div class="section-title">Quick Launch</div>
                <div id="bookmarksList" style="display:grid; grid-template-columns: 1fr 1fr; gap:4px; margin-top:5px;"></div>
                <div style="display:flex; gap:4px; margin-top:5px;">
                    <input id="bmName" placeholder="Name" style="width:40%; padding:5px; margin:0;">
                    <input id="bmUrl" placeholder="URL" style="width:40%; padding:5px; margin:0;">
                    <button onclick="addBookmark()" style="width:20%; padding:5px; margin:0; font-size:0.6rem;">+</button>
                </div>
                
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px; margin-top:10px;">
                    <button onclick="exportData()" style="background:#607d8b; font-size:0.65rem;">Copy Config</button>
                    <button onclick="downloadConfig()" style="background:#009688; font-size:0.65rem;">Save Config</button>
                </div>
                <div style="display:flex; gap:8px; margin-top:5px;">
                    <button onclick="document.getElementById('importFile').click()" style="background:#673ab7; font-size:0.65rem;">Import</button>
                    <button onclick="location.reload()" style="background:#333; font-size:0.65rem;">Relock</button>
                    <button onclick="nukeStorage()" style="background:var(--danger); font-size:0.65rem;">NUKE</button>
                    <input type="file" id="importFile" style="display:none;" onchange="importFromFile(event)">
                </div>
            </div>
        </div>
    </div>

    <div id="sandboxModal">
        <div class="frameWrap">
            <button class="closeBtn" onclick="closeSandbox()">X Close</button>
            <iframe id="sandboxFrame" style="width:100%; height:100%; border:none;"></iframe>
        </div>
    </div>

    <div id="toastContainer"></div>

    <script>
        const RECOVERY = "SUPER-ADMIN-2026";
        const STEALTH_SEQ = "cloak";
        const DECOY_KEY = "planner2026";
        let inputSeq = "";
        let idleTimer = null;

        const defaults = {
            activeProfile: 'school',
            school: { key: "1234", title: "404 Not Found", favicon: "https://ssl.gstatic.com/favicon.ico" },
            panicKey: "\\", logs: [], theme: 'light', idleTimeout: 120000, bookmarks: [], sessionStart: Date.now(), clickJack: false, autoLock: true, customCSS: ""
        };

        let settings = {};
        function save() { localStorage.setItem('cloakerSettings', JSON.stringify(settings)); }
        function loadSettings() {
            const raw = localStorage.getItem('cloakerSettings');
            settings = raw ? JSON.parse(raw) : JSON.parse(JSON.stringify(defaults));
        }

        const presets = {
            google: { title: "Google", icon: "https://www.google.com/favicon.ico" },
            drive: { title: "My Drive - Google Drive", icon: "https://ssl.gstatic.com/docs/doclist/images/drive_2022q3_32dp.png" },
            classroom: { title: "Google Classroom", icon: "https://ssl.gstatic.com/classroom/favicon.png" },
            calc: { title: "Calculator", icon: "https://www.google.com/favicon.ico" },
            "404": { title: "404 Not Found", icon: "https://ssl.gstatic.com/favicon.ico" }
        };

        function applyCSS() {
            const css = document.getElementById('customCSS').value;
            settings.customCSS = css;
            document.getElementById('dynamicStyles').innerHTML = css;
            save(); showToast('Skin Applied');
        }

        function setDisguise(type) {
            const prof = settings[settings.activeProfile];
            if (type === 'custom') {
                const area = document.getElementById('customDisguise');
                area.style.display = area.style.display === 'none' ? 'block' : 'none';
                return;
            }
            prof.title = presets[type].title;
            prof.favicon = presets[type].icon;
            save(); updateTab(); showToast(`Disguise: ${type}`);
        }

        function updateTab() {
            const prof = settings[settings.activeProfile] || defaults.school;
            document.title = prof.title;
            document.getElementById('tabIcon').href = prof.favicon;
        }

        function mirrorTab() {
            const blob = new Blob([document.documentElement.outerHTML], {type: 'text/html'});
            const url = URL.createObjectURL(blob);
            const win = window.open('about:blank', '_blank');
            win.document.write(`<iframe src="${url}" style="width:100%;height:100%;border:none;position:fixed;inset:0;"></iframe>`);
            window.location.replace("https://google.com");
        }

        function checkPing() {
            const target = prompt("URL to probe:", "https://google.com");
            if(!target) return;
            const start = Date.now();
            fetch(target, { mode: 'no-cors' }).then(() => showToast(`Likely Unblocked (${Date.now()-start}ms)`)).catch(() => showToast("Likely Blocked"));
        }

        function nukeStorage() {
            if(confirm("Factory Reset?") && confirm("Final Warning!")) { localStorage.clear(); location.reload(); }
        }

        function toggleClickJack() { settings.clickJack = !settings.clickJack; save(); updateAdvancedUI(); }
        function toggleAutoLock() { settings.autoLock = !settings.autoLock; save(); updateAdvancedUI(); }

        function updateAdvancedUI() {
            document.getElementById('cjBtn').textContent = `Clickjack: ${settings.clickJack ? 'ON' : 'OFF'}`;
            document.getElementById('alBtn').textContent = `Auto-Lock: ${settings.autoLock ? 'ON' : 'OFF'}`;
            document.getElementById('cjBtn').style.background = settings.clickJack ? 'var(--success)' : '#673ab7';
            document.getElementById('alBtn').style.background = settings.autoLock ? 'var(--success)' : '#ff9800';
        }

        function init() {
            loadSettings();
            document.body.setAttribute('data-theme', settings.theme || 'light');
            if (settings.customCSS) {
                document.getElementById('dynamicStyles').innerHTML = settings.customCSS;
                document.getElementById('customCSS').value = settings.customCSS;
            }
            updateProfileSelect(); renderLogs(); renderBookmarks(); updateTab(); updateAdvancedUI();

            window.addEventListener('keydown', (e) => {
                inputSeq += e.key.toLowerCase();
                if (inputSeq.endsWith(STEALTH_SEQ)) {
                    document.getElementById('shadow').style.display = 'none';
                    const main = document.getElementById('mainUI');
                    main.style.display = 'flex';
                    setTimeout(() => main.style.opacity = '1', 50);
                    inputSeq = "";
                }
                if (e.key === settings.panicKey) location.reload();
                resetIdleTimer();
            });
            ['mousemove', 'mousedown'].forEach(v => window.addEventListener(v, resetIdleTimer));
            startIdleTimer();
        }

        function verify() {
            const input = document.getElementById('pswd').value;
            const currentKey = (settings[settings.activeProfile] || defaults.school).key;
            if (input === currentKey || input === RECOVERY) {
                document.getElementById('loginArea').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
            } else if (input === DECOY_KEY) {
                document.getElementById('mainUI').style.display = 'none';
                document.getElementById('decoyUI').style.display = 'block';
            } else showToast('Wrong Key');
        }

        function launch() {
            const target = document.getElementById('target').value.trim();
            if (!target) return;
            settings.logs = [{ time: new Date().toLocaleTimeString(), target }, ...(settings.logs || [])].slice(0, 10);
            save(); renderLogs();
            if (document.getElementById('sandboxChk').checked) {
                document.getElementById('sandboxFrame').src = target;
                document.getElementById('sandboxModal').style.display = 'flex';
            } else {
                const win = window.open('about:blank', '_blank');
                win.document.write(`<iframe src="${target}" style="width:100%;height:100%;border:none;position:fixed;inset:0;"></iframe>`);
            }
        }

        function startIdleTimer() { if (settings.autoLock) idleTimer = setTimeout(() => { if(document.getElementById('dashboard').style.display==='block') location.reload(); }, settings.idleTimeout); }
        function resetIdleTimer() { clearTimeout(idleTimer); startIdleTimer(); }
        function updateProfileSelect() {
            const sel = document.getElementById('profileSelect'); sel.innerHTML = '';
            Object.keys(settings).forEach(k => { if (settings[k]?.key) sel.innerHTML += `<option value="${k}" ${k===settings.activeProfile?'selected':''}>${k}</option>`; });
        }
        function switchProfile(v) { settings.activeProfile = v; save(); updateTab(); showToast('Profile: ' + v); }
        function addProfile() {
            const n = document.getElementById('newProfileName');
            if (!n.value || settings[n.value]) return;
            settings[n.value] = JSON.parse(JSON.stringify(defaults.school));
            n.value = ''; save(); updateProfileSelect();
        }
        function addBookmark() {
            const n = document.getElementById('bmName'), u = document.getElementById('bmUrl');
            if (!n.value || !u.value) return;
            settings.bookmarks.push({ name: n.value, url: u.value });
            n.value = ''; u.value = ''; save(); renderBookmarks();
        }
        function renderBookmarks() {
            document.getElementById('bookmarksList').innerHTML = (settings.bookmarks || []).map((bm, i) => `
                <button class="bm-btn" onclick="document.getElementById('target').value='${bm.url}';launch()">
                    ${bm.name}<div class="bm-del" onclick="event.stopPropagation();settings.bookmarks.splice(${i},1);save();renderBookmarks();">×</div>
                </button>`).join('');
        }
        function renderLogs() { document.getElementById('logList').innerHTML = (settings.logs || []).map(l => `<div>[${l.time}] ${l.target}</div>`).join('') || 'No history'; }
        function clearLog() { settings.logs = []; save(); renderLogs(); }
        function showToast(m) { const t = document.createElement('div'); t.className='toast'; t.textContent=m; document.getElementById('toastContainer').appendChild(t); setTimeout(()=>t.remove(),2000); }
        function closeSandbox() { document.getElementById('sandboxModal').style.display = 'none'; document.getElementById('sandboxFrame').src = 'about:blank'; }
        function toggleTheme() { settings.theme = settings.theme === 'dark' ? 'light' : 'dark'; document.body.setAttribute('data-theme', settings.theme); save(); }
        function exportData() { navigator.clipboard.writeText(btoa(JSON.stringify(settings))).then(()=>showToast('Config Copied')); }
        function downloadConfig() { const a = document.createElement('a'); a.href = 'data:text/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(settings)); a.download = 'config.json'; a.click(); }
        function importFromFile(e) { const r = new FileReader(); r.onload = () => { settings = JSON.parse(r.result); save(); location.reload(); }; r.readAsText(e.target.files[0]); }
        function setPanicKey() { const b = document.getElementById('pkDisp'); b.textContent = '...'; window.onkeydown = (e) => { settings.panicKey = e.key; b.textContent = 'Panic: ' + e.key; save(); window.onkeydown = null; init(); }; }
        function toggleProtect() { showToast('Security Ready'); }
    </script>
</body>
</html>
