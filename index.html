<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="tabTitle">404 Not Found</title>
    <link id="tabIcon" rel="icon" type="image/png" href="https://ssl.gstatic.com">
    
    <style>
        :root {
            --bg-main: #fff; --text-main: #000; --panel-bg: #f4f4f4; --panel-border: #ddd;
            --accent: #1a73e8; --accent-2: #34a853; --input-bg: #fff; --input-border: #ccc;
            --input-text: #000; --danger: #d93025;
        }
        body[data-theme="dark"] {
            --bg-main: #111; --text-main: #eee; --panel-bg: #222; --panel-border: #444;
            --input-bg: #000; --input-border: #555; --input-text: #0f0;
        }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg-main); color: var(--text-main); height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; overflow: hidden; transition: 0.3s; }
        #shadow { text-align: center; user-select: none; }
        #error404 { font-size: 5rem; margin: 0; font-weight: 300; }
        .trigger { cursor: pointer; }
        #mainUI { display: none; width: 100%; flex-direction: column; justify-content: center; align-items: center; position: absolute; z-index: 100; }
        .container { background: var(--panel-bg); padding: 25px; border-radius: 12px; border: 1px solid var(--panel-border); width: 420px; box-shadow: 0 15px 40px rgba(0,0,0,0.2); max-height: 90vh; overflow-y: auto; transition: opacity 0.4s ease; }
        input, select { width: 92%; padding: 10px; margin: 8px auto; border-radius: 6px; border: 1px solid var(--input-border); background: var(--input-bg); color: var(--input-text); font-family: monospace; display: block; outline: none; }
        button { padding: 12px; cursor: pointer; background: var(--accent); color: white; border: none; border-radius: 6px; width: 100%; font-weight: 600; margin-top: 10px; }
        .launch-btn { background: var(--accent-2); font-size: 1.1rem; }
        .section-title { margin-top: 15px; font-size: 0.7rem; color: #888; text-transform: uppercase; letter-spacing: 1px; padding: 0 10px; display: flex; justify-content: space-between; align-items: center; }
        .sub-panel { background: rgba(0,0,0,0.05); padding: 10px; border-radius: 8px; margin-top: 10px; border: 1px dashed #bbb; }
        #logList { max-height: 100px; overflow-y: auto; font-size: 0.7rem; font-family: monospace; background: #000; color: #0f0; padding: 5px; border-radius: 4px; margin-top: 5px; }
        
        /* Sandbox Modal */
        #sandboxModal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 2000; }
        .frameWrap { width: 95%; height: 90%; background: #000; border-radius: 8px; overflow: hidden; position: relative; border: 1px solid #444; }
        iframe { width: 100%; height: 100%; border: none; }
        .closeBtn { position: absolute; top: 10px; right: 10px; background: var(--danger); color: #fff; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        .toast { position: fixed; bottom: 20px; right: 20px; background: #333; color: #fff; padding: 10px 20px; border-radius: 6px; font-size: 0.9rem; z-index: 3000; border: 1px solid var(--accent); }
    </style>
</head>
<body onload="init()">

    <div id="shadow">
        <h1 id="error404">Error <span class="trigger" onclick="showLogin()">4</span>04</h1>
        <p>The requested URL was not found on this server.</p>
    </div>

    <div id="mainUI">
        <div class="container" id="uiContainer">
            <div id="loginArea">
                <h2 style="margin-top:0; font-size:1.2rem;">System Restricted</h2>
                <input type="password" id="pswd" placeholder="Access Key...">
                <button onclick="verify()">Unlock</button>
            </div>

            <div id="dashboard" style="display:none;">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h1 style="font-size: 1.1rem; margin:0; color: var(--accent);">Elite Cloaker v44</h1>
                    <button id="themeBtn" onclick="toggleTheme()" style="width:auto; margin:0; padding:5px 10px; font-size:0.7rem;">Theme</button>
                </div>

                <div class="section-title">Profile Selector</div>
                <select id="profileSelect" onchange="switchProfile(this.value)">
                    <option value="school">School Profile</option>
                    <option value="gaming">Gaming Profile</option>
                </select>

                <div class="section-title">Security & Encryption</div>
                <button id="protectBtn" onclick="toggleProtect()" style="background:#795548; font-size:0.7rem;">Encrypt/Protect Keys</button>
                <button id="pkDisp" onclick="setPanicKey()" style="background:#444; font-size:0.7rem;">Set Panic Key</button>

                <div class="section-title">Forensics Log</div>
                <div id="logList">No activity.</div>
                <button onclick="clearLog()" style="background:var(--danger); font-size:0.7rem; margin-top:5px;">Wipe Forensic Logs</button>

                <div class="section-title">Launch Site</div>
                <input type="text" id="target" placeholder="https://site.com">
                <div style="display:flex; align-items:center; gap:8px; margin:5px 0;">
                    <input type="checkbox" id="sandboxChk" style="width:auto;">
                    <label style="font-size:0.8rem;">Launch in Sandbox Modal</label>
                </div>
                <button class="launch-btn" onclick="launch()">Execute Cloak</button>
                
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <button onclick="exportData()" style="background:#607d8b; font-size:0.7rem;">Export Data</button>
                    <button onclick="location.reload()" style="background:#333; font-size:0.7rem;">Relock UI</button>
                </div>
            </div>
        </div>
    </div>

    <div id="sandboxModal">
        <div class="frameWrap">
            <button class="closeBtn" onclick="closeSandbox()">X Close</button>
            <iframe id="sandboxFrame"></iframe>
        </div>
    </div>

    <div id="toastContainer"></div>

    <script>
        const RECOVERY = "SUPER-ADMIN-2026";
        const defaults = {
            activeProfile: 'school',
            school: { key: "1234", panic: "https://classroom.google.com", title: "404 Not Found" },
            gaming: { key: "7777", panic: "https://www.google.com", title: "My Drive" },
            panicKey: "\\", logs: [], theme: 'light', keysProtected: false
        };

        let settings = JSON.parse(localStorage.getItem('cloakerSettings')) || defaults;

        // Encryption Helpers
        const bufToB64 = buf => btoa(String.fromCharCode(...new Uint8Array(buf)));
        const b64ToBuf = str => Uint8Array.from(atob(str), c => c.charCodeAt(0));

        async function deriveKey(pass, salt) {
            const enc = new TextEncoder();
            const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(pass), 'PBKDF2', false, ['deriveKey']);
            return crypto.subtle.deriveKey(
                { name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' },
                keyMaterial, { name: 'AES-GCM', length: 256 }, false, ['encrypt', 'decrypt']
            );
        }

        async function encryptKeys(pass) {
            try {
                const salt = crypto.getRandomValues(new Uint8Array(16));
                const iv = crypto.getRandomValues(new Uint8Array(12));
                const key = await deriveKey(pass, salt);
                const data = new TextEncoder().encode(JSON.stringify({ s: settings.school.key, g: settings.gaming.key }));
                const ct = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, data);
                settings.encryptedKeys = { salt: bufToB64(salt), iv: bufToB64(iv), data: bufToB64(ct) };
                settings.keysProtected = true;
                delete settings.school.key; delete settings.gaming.key;
                save(); switchProfile(settings.activeProfile); showToast("Keys Encrypted");
            } catch (e) { showToast("Encryption Failed"); }
        }

        async function decryptKeys(pass) {
            try {
                const e = settings.encryptedKeys;
                const key = await deriveKey(pass, b64ToBuf(e.salt));
                const pt = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: b64ToBuf(e.iv) }, key, b64ToBuf(e.data));
                const obj = JSON.parse(new TextDecoder().decode(pt));
                settings.school.key = obj.s; settings.gaming.key = obj.g;
                settings.keysProtected = false; delete settings.encryptedKeys;
                save(); switchProfile(settings.activeProfile); return true;
            } catch (e) { showToast("Wrong Passphrase"); return false; }
        }

        function toggleProtect() {
            if (settings.keysProtected) {
                const p = prompt("Enter Master Passphrase to Unlock:");
                if (p) decryptKeys(p);
            } else {
                const p = prompt("Set a Master Passphrase to encrypt your profiles:");
                if (p) encryptKeys(p);
            }
        }

        // Logic
        function save() { localStorage.setItem('cloakerSettings', JSON.stringify(settings)); }
        function init() {
            applyTheme();
            switchProfile(settings.activeProfile || 'school');
            renderLogs();
            document.addEventListener('visibilitychange', () => {
                document.getElementById('uiContainer').style.opacity = document.hidden ? 0.1 : 1;
            });
        }

        function applyTheme() { document.body.setAttribute('data-theme', settings.theme); }
        function toggleTheme() { settings.theme = settings.theme === 'dark' ? 'light' : 'dark'; applyTheme(); save(); }
        function showLogin() { document.getElementById('shadow').style.display = 'none'; document.getElementById('mainUI').style.display = 'flex'; }
        
        function verify() {
            if (settings.keysProtected) return showToast("Unlock Keys First");
            const input = document.getElementById('pswd').value;
            const currentKey = (settings[settings.activeProfile] || defaults.school).key;
            if (input === currentKey || input === RECOVERY) {
                document.getElementById('loginArea').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
            } else showToast("Access Denied");
        }

        function switchProfile(p) {
            settings.activeProfile = p;
            const data = settings[p] || defaults[p];
            document.getElementById('tabTitle').textContent = data.title;
            document.getElementById('pkDisp').textContent = "Panic Key: " + (settings.panicKey || "\\");
            document.getElementById('protectBtn').textContent = settings.keysProtected ? "Unlock Profiles" : "Encrypt Profiles";
            save();
        }

        function renderLogs() {
            const list = document.getElementById('logList');
            if (!settings.logs || settings.logs.length === 0) { list.innerHTML = "No logs."; return; }
            list.innerHTML = settings.logs.map(l => `<div>[${l.time}] ${l.target}</div>`).join('');
        }

        function clearLog() { settings.logs = []; save(); renderLogs(); showToast("Forensics Wiped"); }

        function openSandbox(url) {
            document.getElementById('sandboxFrame').src = url;
            document.getElementById('sandboxModal').style.display = 'flex';
            window.addEventListener('keydown', handlePanic);
        }

        function closeSandbox() {
            document.getElementById('sandboxModal').style.display = 'none';
            document.getElementById('sandboxFrame').src = 'about:blank';
            window.removeEventListener('keydown', handlePanic);
        }

        function handlePanic(e) {
            if (e.key === (settings.panicKey || "\\")) {
                closeSandbox();
                location.replace(settings[settings.activeProfile].panic);
            }
        }

        function launch() {
            const target = document.getElementById('target').value;
            if (!target.startsWith('http')) return showToast("Need https://");
            
            if (!settings.logs) settings.logs = [];
            settings.logs.unshift({ time: new Date().toLocaleTimeString(), target: target });
            settings.logs = settings.logs.slice(0, 5);
            save(); renderLogs();

            if (document.getElementById('sandboxChk').checked) {
                openSandbox(target);
            } else {
                const win = window.open('about:blank', '_blank');
                const pData = settings[settings.activeProfile];
                const html = `<html><head><title>${pData.title}</title><style>body,html{margin:0;padding:0;height:100%;overflow:hidden;}iframe{width:100%;height:100%;border:none;}</style></head><body><iframe src="${target}"></iframe><script>window.onkeydown=e=>{if(e.key==="${settings.panicKey}")location.replace("${pData.panic}");}<\/script></body></html>`;
                win.document.write(html);
                win.document.close();
            }
        }

        function setPanicKey() {
            const btn = document.getElementById('pkDisp'); btn.textContent = "Press any key...";
            window.onkeydown = (e) => { settings.panicKey = e.key; btn.textContent = "Panic Key: " + e.key; save(); window.onkeydown = null; };
        }

        function exportData() { navigator.clipboard.writeText(btoa(JSON.stringify(settings))).then(() => showToast("Export Copied")); }
        function showToast(m) { const t = document.createElement('div'); t.className='toast'; t.textContent=m; document.getElementById('toastContainer').appendChild(t); setTimeout(()=>t.remove(),2000); }
    </script>
</body>
</html>
