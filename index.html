<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="tabTitle">404 Not Found</title>
    <link id="tabIcon" rel="icon" type="image/png" href="https://ssl.gstatic.com">
    
    <style>
        :root {
            --bg-main: #fff; --text-main: #000; --panel-bg: #f4f4f4; --panel-border: #ddd;
            --accent: #1a73e8; --accent-2: #34a853; --input-bg: #fff; --input-border: #ccc;
            --input-text: #000; --danger: #d93025;
        }
        body[data-theme="dark"] {
            --bg-main: #111; --text-main: #eee; --panel-bg: #222; --panel-border: #444;
            --input-bg: #000; --input-border: #555; --input-text: #0f0;
        }
        body { margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg-main); color: var(--text-main); height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; overflow: hidden; transition: 0.3s; }
        
        /* --- HIDDEN LOGIN STYLES --- */
        #shadow { text-align: center; user-select: none; }
        #error404 { font-size: 5rem; margin: 0; font-weight: 300; }
        .trigger { cursor: pointer; transition: color 0.2s; }
        .trigger:hover { color: var(--accent); }

        /* --- CLOAKER UI --- */
        #mainUI { display: none; width: 100%; flex-direction: column; justify-content: center; align-items: center; position: absolute; z-index: 100; }
        .container { background: var(--panel-bg); padding: 25px; border-radius: 12px; border: 1px solid var(--panel-border); width: 420px; box-shadow: 0 15px 40px rgba(0,0,0,0.2); max-height: 90vh; overflow-y: auto; transition: opacity 0.4s ease; }
        input, select { width: 92%; padding: 10px; margin: 8px auto; border-radius: 6px; border: 1px solid var(--input-border); background: var(--input-bg); color: var(--input-text); font-family: monospace; display: block; outline: none; }
        button { padding: 12px; cursor: pointer; background: var(--accent); color: white; border: none; border-radius: 6px; width: 100%; font-weight: 600; margin-top: 10px; transition: filter 0.2s; }
        button:hover { filter: brightness(1.1); }
        .launch-btn { background: var(--accent-2); font-size: 1.1rem; }
        .section-title { margin-top: 15px; font-size: 0.7rem; color: #888; text-transform: uppercase; letter-spacing: 1px; padding: 0 10px; display: flex; justify-content: space-between; align-items: center; }
        .sub-panel { background: rgba(0,0,0,0.05); padding: 10px; border-radius: 8px; margin-top: 10px; border: 1px dashed #bbb; }
        .toast { position: fixed; bottom: 20px; right: 20px; background: #333; color: #fff; padding: 10px 20px; border-radius: 6px; font-size: 0.9rem; z-index: 1000; }
    </style>
</head>
<body onload="init()">

    <div id="shadow">
        <h1 id="error404">Error <span class="trigger" onclick="showLogin()">4</span>04</h1>
        <p>The requested URL was not found on this server.</p>
    </div>

    <div id="mainUI">
        <div class="container" id="uiContainer">
            
            <div id="loginArea">
                <h2 style="margin-top:0; font-size:1.2rem;">System Restricted</h2>
                <input type="password" id="pswd" placeholder="Enter Access Key...">
                <button onclick="verify()">Unlock System</button>
            </div>

            <div id="dashboard" style="display:none;">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h1 style="font-size: 1.2rem; margin:0; color: var(--accent);">Elite Cloaker v41</h1>
                    <select id="profileSelect" style="width:auto; margin:0; padding:4px; font-size:10px;" onchange="switchProfile(this.value)">
                        <option value="school">School</option>
                        <option value="gaming">Gaming</option>
                    </select>
                </div>

                <div class="section-title">Identity Config</div>
                <div class="sub-panel">
                    <input type="text" id="editTitle" placeholder="Tab Title">
                    <input type="text" id="editPanic" placeholder="Panic Redirect URL">
                    <button onclick="saveProfileChanges()" style="background:#444; font-size:0.7rem;">Save Identity</button>
                </div>

                <div class="section-title">Security</div>
                <div style="display:flex; align-items:center; gap:10px; padding: 0 10px;">
                    <input type="checkbox" id="autoGhostToggle" checked>
                    <label style="font-size:0.7rem; color:#888;">Auto-Ghost on blur</label>
                </div>

                <div class="section-title">Launch</div>
                <input type="password" id="target" placeholder="Target URL (https://...)">
                <button class="launch-btn" onclick="launch()">Launch Cloak</button>
                
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <button onclick="exportData()" style="background:#607d8b; font-size:0.7rem;">Export</button>
                    <button onclick="importData()" style="background:#673ab7; font-size:0.7rem;">Import</button>
                </div>
                <button onclick="location.reload()" style="background:#333; font-size:0.7rem;">Lock UI</button>
            </div>
        </div>
    </div>

    <div id="toastContainer"></div>

    <script>
        const RECOVERY = "SUPER-ADMIN-2026";
        let settings = JSON.parse(localStorage.getItem('cloakerSettings')) || {
            activeProfile: 'school',
            school: { key: "1234", panic: "https://classroom.google.com", title: "404 Not Found" },
            gaming: { key: "7777", panic: "https://www.google.com", title: "My Drive" }
        };

        function save() { localStorage.setItem('cloakerSettings', JSON.stringify(settings)); }

        function init() {
            switchProfile(settings.activeProfile);
            window.onblur = () => { if(document.getElementById('autoGhostToggle').checked) document.getElementById('uiContainer').style.opacity = 0.1; };
            window.onfocus = () => { document.getElementById('uiContainer').style.opacity = 1; };
        }

        function showLogin() {
            document.getElementById('shadow').style.display = 'none';
            document.getElementById('mainUI').style.display = 'flex';
        }

        function verify() {
            const input = document.getElementById('pswd').value;
            const currentKey = settings[settings.activeProfile].key;
            if (input === currentKey || input === RECOVERY) {
                document.getElementById('loginArea').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
            } else {
                showToast("Access Denied");
            }
        }

        function switchProfile(p) {
            settings.activeProfile = p;
            const data = settings[p];
            document.getElementById('tabTitle').textContent = data.title;
            document.getElementById('profileSelect').value = p;
            document.getElementById('editTitle').value = data.title;
            document.getElementById('editPanic').value = data.panic;
            save();
        }

        function saveProfileChanges() {
            const p = settings.activeProfile;
            settings[p].title = document.getElementById('editTitle').value;
            settings[p].panic = document.getElementById('editPanic').value;
            save();
            switchProfile(p);
            showToast("Identity Updated");
        }

        function launch() {
            const target = document.getElementById('target').value;
            const pData = settings[settings.activeProfile];
            if (!target.startsWith('http')) return showToast("Use https://");
            
            const frameHTML = `<html><head><title>${pData.title}</title><style>body,html{margin:0;padding:0;height:100%;overflow:hidden;background:#000;}iframe{width:100%;height:100%;border:none;}</style></head><body><iframe src="${target}"></iframe><script>window.onkeydown=(e)=>{if(e.key==="\\\\")window.location.replace("${pData.panic}");};<\/script></body></html>`;
            const win = window.open('about:blank', '_blank');
            if (win) { win.document.write(frameHTML); win.document.close(); }
        }

        function exportData() {
            const dataStr = btoa(JSON.stringify(settings));
            navigator.clipboard.writeText(dataStr).then(() => showToast("Config Copied!"));
        }

        function importData() {
            const dataStr = prompt("Paste config string:");
            if (dataStr) {
                try {
                    settings = JSON.parse(atob(dataStr));
                    save();
                    location.reload();
                } catch (e) { alert("Invalid data."); }
            }
        }

        function showToast(m) {
            const t = document.createElement('div');
            t.className = 'toast';
            t.textContent = m;
            document.getElementById('toastContainer').appendChild(t);
            setTimeout(() => t.remove(), 2000);
        }
    </script>
</body>
</html>
